services:
  postgres:
    image: postgres:16-alpine
    container_name: funded-shield-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: funded_shield
      POSTGRES_PASSWORD: funded_shield
      POSTGRES_DB: funded_shield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funded_shield -d funded_shield"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
